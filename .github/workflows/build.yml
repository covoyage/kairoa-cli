name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Test build on multiple platforms
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Get dependencies
      run: go mod download

    - name: Build
      env:
        CGO_ENABLED: 0
      run: go build -v .

    - name: Test
      run: go test -v ./...

    - name: Test CLI commands (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        ./kairoa --help
        ./kairoa hash text "hello"
        ./kairoa uuid v4
        ./kairoa base64 encode "test"
        ./kairoa time now

    - name: Test CLI commands (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        .\kairoa.exe --help
        .\kairoa.exe hash text "hello"
        .\kairoa.exe uuid v4
        .\kairoa.exe base64 encode "test"
        .\kairoa.exe time now

  # Lint code
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  # Check code formatting
  format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files need formatting:"
          gofmt -s -l .
          exit 1
        fi
