name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Test build on multiple platforms
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Get dependencies
      run: go mod download

    - name: Build (Unix)
      if: runner.os != 'Windows'
      env:
        CGO_ENABLED: 0
      run: |
        go build -v -o kairoa .
        echo "Built binary:"
        ls -la kairoa
        file kairoa || echo "file command not available"

    - name: Build (Windows)
      if: runner.os == 'Windows'
      env:
        CGO_ENABLED: 0
      shell: pwsh
      run: |
        go build -v -o kairoa.exe .
        Write-Host "Built binary:"
        Get-Item kairoa.exe | Select-Object Name, Length

    - name: Test
      run: go test -v ./...

    - name: Test CLI commands (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "Current directory: $(pwd)"
        echo "Binary location: $(ls -la kairoa)"
        ./kairoa --help
        ./kairoa hash text "hello"
        ./kairoa uuid v4
        ./kairoa base64 encode "test"
        ./kairoa time now

    - name: Test CLI commands (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        .\kairoa.exe --help
        .\kairoa.exe hash text "hello"
        .\kairoa.exe uuid v4
        .\kairoa.exe base64 encode "test"
        .\kairoa.exe time now


