# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: kairoa
    main: .
    binary: kairoa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

# Archive configurations
archives:
  - id: kairoa
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

# Checksum configuration
checksum:
  name_template: 'checksums.txt'

# Snapshot configuration
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Changelog configuration
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# Release configuration
release:
  github:
    owner: covoyage
    name: kairoa-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-v{{.Version}}"
  header: |
    ## Kairoa CLI v{{.Version}}
    
    ### Installation
    
    #### macOS
    ```bash
    # Intel Mac
    brew install covoyage/tap/kairoa
    # or
    curl -L -o kairoa.tar.gz https://github.com/covoyage/kairoa-cli/releases/download/v{{.Version}}/kairoa_{{.Version}}_darwin_x86_64.tar.gz
    tar -xzf kairoa.tar.gz
    sudo mv kairoa /usr/local/bin/
    ```
    
    #### Linux
    ```bash
    curl -L -o kairoa.tar.gz https://github.com/covoyage/kairoa-cli/releases/download/v{{.Version}}/kairoa_{{.Version}}_linux_x86_64.tar.gz
    tar -xzf kairoa.tar.gz
    sudo mv kairoa /usr/local/bin/
    ```
    
    #### Windows
    Download and extract the zip file from the assets below.
    
  footer: |
    ## Quick Start
    
    ```bash
    # Calculate hash
    kairoa hash text "hello"
    
    # Generate UUID
    kairoa uuid v4
    
    # Base64 encode
    kairoa base64 encode "hello"
    
    # Format JSON
    echo '{"a":1}' | kairoa json format
    
    # View all commands
    kairoa --help
    ```

# Homebrew tap configuration
brews:
  - name: kairoa
    repository:
      owner: covoyage
      name: homebrew-tap
    folder: Formula
    homepage: https://github.com/covoyage/kairoa-cli
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: "MIT"
    test: |
      system "#{bin}/kairoa", "--version"
    install: |
      bin.install "kairoa"

# Scoop configuration (Windows package manager)
scoops:
  - repository:
      owner: covoyage
      name: scoop-bucket
    folder: bucket
    homepage: https://github.com/covoyage/kairoa-cli
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: MIT

# Docker image configuration (optional)
