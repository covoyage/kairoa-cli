#       - "--label=org.opencontainers.image.revision={{.FullCommit}}"
#       - "--label=org.opencontainers.image.version={{.Version}}"

# NFPMS configuration (deb, rpm, apk packages)
nfpms:
  - id: kairoa
    package_name: kairoa
    vendor: Covoyage
    homepage: https://github.com/covoyage/kairoa-cli
    maintainer: Covoyage <support@covoyage.dev>
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    dependencies:
      - git
    recommends:
      - ca-certificates
    bindir: /usr/bin
    section: utils
    priority: optional
