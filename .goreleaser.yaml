# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: kairoa
    main: .
    binary: kairoa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

# Archive configurations
archives:
  - id: kairoa
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

# Checksum configuration
checksum:
  name_template: 'checksums.txt'

# Snapshot configuration
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Changelog configuration
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# Release configuration
release:
  github:
    owner: covoyage
    name: kairoa-cli
  draft: false
  prerelease: auto
  # name_template intentionally omitted — GitHub uses the tag name as the release title

# Homebrew tap configuration (homebrew_casks replaces deprecated brews since v2.10)
homebrew_casks:
  - name: kairoa
    repository:
      owner: covoyage
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # directory defaults to "Casks"; omit to use default
    homepage: https://github.com/covoyage/kairoa-cli
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: "MIT"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kairoa"]
          end

# Scoop configuration (Windows package manager)
scoops:
  - repository:
      owner: covoyage
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/covoyage/kairoa-cli
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: MIT

# Docker image configuration (optional)
# dockers:
#   - image_templates:
#       - "covoyage/kairoa:{{ .Tag }}"
#       - "covoyage/kairoa:latest"
#     dockerfile: Dockerfile
#     build_flag_templates:
#       - "--pull"
#       - "--label=org.opencontainers.image.created={{.Date}}"
#       - "--label=org.opencontainers.image.title={{.ProjectName}}"
#       - "--label=org.opencontainers.image.revision={{.FullCommit}}"
#       - "--label=org.opencontainers.image.version={{.Version}}"

# NFPMS configuration (deb, rpm, apk packages)
nfpms:
  - id: kairoa
    package_name: kairoa
    vendor: Covoyage
    homepage: https://github.com/covoyage/kairoa-cli
    maintainer: Covoyage <support@covoyage.dev>
    description: "Kairoa CLI - A developer toolbox with 50+ utilities"
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    dependencies:
      - git
    recommends:
      - ca-certificates
    bindir: /usr/bin
    section: utils
    priority: optional
